<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Rolodex Sync</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #0e0e14; color: #eee; padding: 1.5rem; max-width: 560px; margin: auto; }
  h1 { font-size: 1.3rem; margin: 0 0 .25rem; }
  p.sub { color: #888; margin: 0 0 1.5rem; font-size: .9rem; }
  label { display:block; font-size:.8rem; color:#888; margin-top:1rem; margin-bottom:.35rem; }
  input { width:100%; box-sizing:border-box; background:#1a1a22; color:#eee; border:1px solid #2a2a36; border-radius:8px; padding:.65rem .75rem; font-size:.9rem; font-family: ui-monospace, monospace; }
  .row { display:flex; gap:.6rem; margin-top:1.2rem; }
  button { flex:1; background:#50c890; color:#0e0e14; border:0; border-radius:10px; padding:.85rem; font-size:1rem; font-weight:600; cursor:pointer; }
  button.secondary { background:#2a2a36; color:#eee; }
  button:active { transform: scale(.98); }
  #status { margin-top:1.2rem; padding:.75rem .9rem; background:#1a1a22; border-radius:8px; font-size:.85rem; min-height:1.2rem; white-space:pre-wrap; word-break:break-word; }
  .ok { color:#50c890; }
  .err { color:#ff6b6b; }
  a { color:#50c890; }
  .meta { font-size:.75rem; color:#666; margin-top:.5rem; }
</style>
</head>
<body>
<h1>Rolodex Sync</h1>
<p class="sub">Push or pull your contacts to your laptop.</p>

<label for="url">Sync URL</label>
<input id="url" placeholder="https://xxx.trycloudflare.com" />
<div class="meta">Saved in this browser. Paste your laptop's tunnel URL.</div>

<div class="row">
  <button id="push">↑ Push to laptop</button>
  <button id="pull" class="secondary">↓ Pull to device</button>
</div>

<div id="status">Ready.</div>
<p style="margin-top:2rem"><a href="/CRM/">← Back to Rolodex</a></p>

<script>
const KEY = "crm-contacts";
const URL_KEY = "crm-sync-url";
const $ = (id) => document.getElementById(id);
const status = (msg, cls="") => { const s=$("status"); s.className=cls; s.textContent=msg; };

$("url").value = localStorage.getItem(URL_KEY) || "";
$("url").addEventListener("input", e => localStorage.setItem(URL_KEY, e.target.value.trim().replace(/\/$/,"")));

async function push() {
  const base = ($("url").value || "").trim().replace(/\/$/,"");
  if (!base) return status("Enter sync URL first.", "err");
  const raw = localStorage.getItem(KEY) || "[]";
  let data; try { data = JSON.parse(raw); } catch { return status("Local data is invalid JSON.", "err"); }
  status("Pushing " + data.length + " contacts…");
  try {
    const r = await fetch(base + "/sync", { method: "POST", headers: {"Content-Type":"application/json"}, body: raw });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    status("✓ Pushed " + j.count + " contacts at " + new Date(j.savedAt).toLocaleString(), "ok");
  } catch (e) { status("✗ Push failed: " + e.message, "err"); }
}

async function pull() {
  const base = ($("url").value || "").trim().replace(/\/$/,"");
  if (!base) return status("Enter sync URL first.", "err");
  if (!confirm("Replace contacts on this device with the laptop's copy?")) return;
  status("Pulling…");
  try {
    const r = await fetch(base + "/sync", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    if (!Array.isArray(data)) throw new Error("expected an array");
    localStorage.setItem(KEY, JSON.stringify(data));
    status("✓ Pulled " + data.length + " contacts. Open Rolodex to see them.", "ok");
  } catch (e) { status("✗ Pull failed: " + e.message, "err"); }
}

$("push").onclick = push;
$("pull").onclick = pull;
</script>
</body>
</html>
